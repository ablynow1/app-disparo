version: '3.8'

services:
  # -----------------------------------------------------------------------------------
  # TRAEFIK: O Porteiro e Agente SSL (Zero-Config Let's Encrypt)
  # -----------------------------------------------------------------------------------
  traefik:
    image: traefik:v3.0
    container_name: traefik_proxy
    restart: unless-stopped
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redireciona tudo http -> https
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # Configuração CA Let's Encrypt (Substitua por um e-mail seu em produção)
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@seudominio.com.br"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - app_network

  # -----------------------------------------------------------------------------------
  # POSTGRESQL REMOVIDO: O Banco de Dados agora é hospedado na Nuvem MongoDB Atlas
  # -----------------------------------------------------------------------------------

  # -----------------------------------------------------------------------------------
  # REDIS: Sistema Nervoso do BullMQ
  # -----------------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: supersaas_redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASS:-super_senha_redis}"]
    volumes:
      - redis_data:/data
    networks:
      - app_network

  # -----------------------------------------------------------------------------------
  # BACKEND: API Node.js + Prisma + BullMQ Workers
  # -----------------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: supersaas_api
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3333
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://:${REDIS_PASS:-super_senha_redis}@redis:6379
      - EVOLUTION_API_URL=http://evolution_api:8080
      - EVOLUTION_API_KEY=${EVO_KEY:-evolution_global_key}
      - OPENAI_API_KEY=${OPENAI_KEY}
    networks:
      - app_network
    depends_on:
      - redis
    # O Traefik roteia qualquer pedido batendo em `/api/` para este container
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${DOMAIN_NAME}`) && PathPrefix(`/api/`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=3333"

  # -----------------------------------------------------------------------------------
  # FRONTEND: AppRouter (Dashboard) Premium Next.js Standalone
  # -----------------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: supersaas_web
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://${DOMAIN_NAME}/api
    networks:
      - app_network
    # O Traefik manda a RAIZ e o Frontend Inteiro para este Node Alpine
    labels:
      - "traefik.enable=true"
      # Regra Catch-All: Roteia o domínio todo MENOS o que cair no prefixo /api/
      - "traefik.http.routers.web.rule=Host(`${DOMAIN_NAME}`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=3000"

  # -----------------------------------------------------------------------------------
  # EVOLUTION MÓDULO (A Opcional Motor Externa do Sistema)
  # -----------------------------------------------------------------------------------
  evolution_api:
    image: atendai/evolution-api:v2.1.1 # Imagem Padrão Atualizada
    container_name: supersaas_evolution
    restart: always
    environment:
      - AUTHENTICATION_API_KEY=${EVO_KEY:-evolution_global_key}
      - SERVER_PORT=8080
      - SERVER_URL=https://${DOMAIN_NAME}/evol
      - DATABASE_PROVIDER=mongodb
      - DATABASE_CONNECTION_URI=${DATABASE_URL}
      - REDIS_URI=redis://:${REDIS_PASS:-super_senha_redis}@redis:6379
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 1G # Controla vazamentos de Chromium em instâncias leves VPS
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.evolution.rule=Host(`${DOMAIN_NAME}`) && PathPrefix(`/evol/`)"
      - "traefik.http.routers.evolution.entrypoints=websecure"
      - "traefik.http.routers.evolution.tls.certresolver=letsencrypt"
      - "traefik.http.services.evolution.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.strip-evol.stripprefix.prefixes=/evol"
      - "traefik.http.routers.evolution.middlewares=strip-evol"

volumes:
  redis_data:

networks:
  app_network:
    driver: bridge
