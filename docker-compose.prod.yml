version: '3.8'

services:
  # -----------------------------------------------------------------------------------
  # TRAEFIK: O Porteiro e Agente SSL (Zero-Config Let's Encrypt)
  # -----------------------------------------------------------------------------------
  traefik:
    image: traefik:v3.0
    container_name: traefik_proxy
    restart: unless-stopped
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      #- "--entrypoints.websecure.address=:443"
      #- "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      #- "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      #- "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      #- "--certificatesresolvers.letsencrypt.acme.email=admin@${DOMAIN_NAME}"
      #- "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - app_network

  # [Ocultando Postgres/Redis intermediarios sem mudanças]
  # ...

  # -----------------------------------------------------------------------------------
  # POSTGRESQL (Servidor Dedicado para a Engine Evolution API)
  # -----------------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: supersaas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${REDIS_PASS:-super_senha_redis}
      POSTGRES_DB: evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  # -----------------------------------------------------------------------------------
  # REDIS: Sistema Nervoso do BullMQ
  # -----------------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: supersaas_redis
    restart: unless-stopped
    command: [ "redis-server", "--requirepass", "${REDIS_PASS:-super_senha_redis}" ]
    volumes:
      - redis_data:/data
    networks:
      - app_network

  # -----------------------------------------------------------------------------------
  # BACKEND: API Node.js + Prisma + BullMQ Workers
  # -----------------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: supersaas_api
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3333
      - DATABASE_URL=postgresql://postgres:${REDIS_PASS:-super_senha_redis}@postgres:5432/appdisparo
      - REDIS_URL=redis://:${REDIS_PASS:-super_senha_redis}@redis:6379
      - EVOLUTION_API_URL=http://evolution_api:8080
      - EVOLUTION_API_KEY=${EVO_KEY:-evolution_global_key}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FRONTEND_URL=https://${DOMAIN_NAME}
    networks:
      - app_network
    depends_on:
      - redis
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=web,websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.services.api.loadbalancer.server.port=3333"

  # -----------------------------------------------------------------------------------
  # FRONTEND: AppRouter (Dashboard) Premium Next.js Standalone
  # -----------------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: supersaas_web
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.${DOMAIN_NAME}
      - DATABASE_URL=postgresql://postgres:${REDIS_PASS:-super_senha_redis}@postgres:5432/appdisparo
      - EVOLUTION_INTERNAL_URL=http://evolution_api:8080
      - EVO_KEY=${EVO_KEY:-evolution_global_key}
    networks:
      - app_network
    depends_on:
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=PathPrefix(`/`)"
      - "traefik.http.routers.web.entrypoints=web,websecure"
      - "traefik.http.routers.web.tls=true"
      - "traefik.http.services.web.loadbalancer.server.port=3000"

  # -----------------------------------------------------------------------------------
  # EVOLUTION MÓDULO (A Opcional Motor Externa do Sistema)
  # -----------------------------------------------------------------------------------
  evolution_api:
    image: atendai/evolution-api:v2.1.1 # Imagem Padrão Atualizada
    container_name: supersaas_evolution
    restart: always
    environment:
      - AUTHENTICATION_API_KEY=${EVO_KEY:-evolution_global_key}
      - SERVER_PORT=8080
      - SERVER_URL=http://3.144.26.191/evol
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:${REDIS_PASS:-super_senha_redis}@postgres:5432/evolution?schema=public
      - REDIS_URI=redis://:${REDIS_PASS:-super_senha_redis}@redis:6379
    networks:
      - app_network
    depends_on:
      - postgres
      - redis
    deploy:
      resources:
        limits:
          memory: 1G # Controla vazamentos de Chromium em instâncias leves VPS
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.evolution.rule=PathPrefix(`/evol`)"
      - "traefik.http.routers.evolution.entrypoints=web,websecure"
      - "traefik.http.routers.evolution.tls=true"
      - "traefik.http.services.evolution.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.strip-evol.stripprefix.prefixes=/evol"
      - "traefik.http.routers.evolution.middlewares=strip-evol"

volumes:
  redis_data:
  postgres_data:


networks:
  app_network:
    driver: bridge
